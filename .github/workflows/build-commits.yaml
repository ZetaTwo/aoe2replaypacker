name: Build

on:
  - push
  - pull_request

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        id: checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        id: setup-pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup NodeJS
        id: setup-node
        uses: actions/setup-node@v6
          cache: "pnpm"

      - name: Install dependencies
        id: install-dependencies
        run: pnpm install

      - name: Build site
        id: build
        #env:
        #  BASE_URL: '${{ steps.pages.outputs.base_url }}'
        run: pnpm run build

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        id: checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        id: setup-pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup NodeJS
        id: setup-node
        uses: actions/setup-node@v6
          cache: "pnpm"

      - name: Install dependencies
        id: install-dependencies
        run: pnpm install

      - name: Run linting
        id: lint
        run: pnpm run lint

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        id: checkout
        uses: actions/checkout@v6

      - name: Setup NodeJS
        id: setup-node
        uses: actions/setup-node@v6

      - name: Setup pnpm
        id: setup-pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Install dependencies
        id: install-dependencies
        run: pnpm install

      - name: Run tests
        id: test
        run: pnpm run test:unit
